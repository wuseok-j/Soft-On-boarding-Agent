version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: soa-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GITHUB_SYSTEM_TOKEN=${GITHUB_SYSTEM_TOKEN}
      - JWT_SECRET=YOUR_SUPER_SECRET_JWT_KEY_FOR_SOFT_ONBOARDING_AGENT_256_BITS
      - APP_OAUTH2_REDIRECT_URI=/login
    env_file:
      - ./backend/.env # Or map global variables here
    networks:
      - soa-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: soa-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - soa-network

networks:
  soa-network:
    driver: bridge
