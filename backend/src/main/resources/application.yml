spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:onboarding}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID:dummy-id}
            client-secret: ${GITHUB_CLIENT_SECRET:dummy-secret}
            scope:
              - read:user
              - user:email
              - repo

app:
  github:
    api-url: https://api.github.com
  llm:
    api-url: ${LLM_API_URL:}
    api-key: ${LLM_API_KEY:}
